<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
color:white;
}

/* SİNEMA SAHNESİ */

#cinema{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
}

/* PERDE */

.curtain{
position:absolute;
top:0;
width:50%;
height:100%;
background:linear-gradient(90deg,#5b0000,#a00000);
z-index:5;
transition:2s;
}

#leftCurtain{left:0;}
#rightCurtain{right:0;}

.openLeft{
transform:translateX(-100%);
}

.openRight{
transform:translateX(100%);
}

/* ORTA YAZI */

#title{
position:absolute;
font-size:42px;
letter-spacing:3px;
z-index:10;
}

/* COUNTDOWN */

#countdown{
position:absolute;
display:none;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

.circle1{
position:absolute;
width:420px;
height:420px;
border:8px solid white;
border-radius:50%;
}

.circle2{
position:absolute;
width:340px;
height:340px;
border:8px solid white;
border-radius:50%;
}

.crossH{
position:absolute;
width:100%;
height:3px;
background:white;
}

.crossV{
position:absolute;
height:100%;
width:3px;
background:white;
}

.wedge{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
background:conic-gradient(
rgba(255,255,255,0.3) 0deg,
rgba(255,255,255,0.3) 60deg,
transparent 60deg
);
animation:spin 1s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

#number{
font-size:200px;
font-weight:bold;
}

/* GRAIN */

.grain{
pointer-events:none;
position:fixed;
width:100%;
height:100%;
background:radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
background-size:3px 3px;
opacity:0.15;
}

/* FLASH */

#flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
transition:0.3s;
}

/* HEART SCREEN */

#codeScreen{
position:fixed;
width:100%;
height:100%;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

#codeScreen h2{
font-weight:normal;
}

input{
padding:12px;
font-size:18px;
border:none;
border-radius:8px;
margin-top:10px;
}

button{
padding:12px 25px;
margin-top:10px;
border:none;
border-radius:20px;
background:#e91e63;
color:white;
font-size:18px;
cursor:pointer;
}

/* KALPLER */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

</style>
</head>

<body>

<div id="cinema">

<div id="leftCurtain" class="curtain"></div>
<div id="rightCurtain" class="curtain"></div>

<div id="title">For My Love ❤️</div>

<div id="countdown">

<div class="circle1"></div>
<div class="circle2"></div>

<div class="crossH"></div>
<div class="crossV"></div>

<div class="wedge"></div>

<div id="number"></div>

</div>

</div>

<div class="grain"></div>

<div id="flash"></div>

<div id="codeScreen">

<h2>Sürprize son bir adım<br>Umarım beğenirsin ❤️</h2>

<input id="codeInput" placeholder="Kod gir">

<button onclick="go()">Aç</button>

</div>

<audio id="sound" src="countdown.mp3"></audio>

<script>

/* PERDE AÇILMA */

setTimeout(()=>{

document.getElementById("leftCurtain").classList.add("openLeft")
document.getElementById("rightCurtain").classList.add("openRight")

document.getElementById("title").style.display="none"

startCountdown()

},2000)


function startCountdown(){

let countdown=document.getElementById("countdown")
let number=document.getElementById("number")
let sound=document.getElementById("sound")

countdown.style.display="flex"

sound.play()

let nums=["3","2","1"]

let i=0

let interval=setInterval(()=>{

number.innerText=nums[i]

i++

if(i>2){

clearInterval(interval)

flash()

}

},1000)

}


function flash(){

let flash=document.getElementById("flash")

flash.style.opacity="1"

setTimeout(()=>{

flash.style.opacity="0"

showCode()

},300)

}


/* KOD EKRANI */

function showCode(){

document.getElementById("cinema").style.display="none"

let screen=document.getElementById("codeScreen")

screen.style.display="flex"

for(let i=0;i<20;i++){

let h=document.createElement("div")

h.className="heart"

h.innerText="❤"

h.style.left=Math.random()*100+"%"

h.style.fontSize=(15+Math.random()*20)+"px"

h.style.animationDuration=(4+Math.random()*4)+"s"

screen.appendChild(h)

}

}


/* KOD GİRİŞ */

function go(){

let code=document.getElementById("codeInput").value.trim()

if(code=="") return

window.location.href="page.html?code="+code

}

</script>

</body>
</html>
