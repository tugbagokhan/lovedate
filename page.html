<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
margin-top:60px;
padding:20px;
background:black;
border-radius:30px;
box-shadow:0 0 40px rgba(255,0,80,0.6);
width:90%;
max-width:420px;
margin-left:auto;
margin-right:auto;
}

img{
width:100%;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,80,0.5);
}

button{
margin-top:25px;
padding:15px 40px;
border:none;
border-radius:40px;
background:#f3b6c1;
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Bizim Şarkımız ❤️</h1>

<div class="container">

<img src="https://res.cloudinary.com/dbtlit7hz/image/upload/v1773335961/photo1_wq6qze.jpg">

<br>

<button onclick="playSong()">Şarkıyı Başlat 🎵</button>

<audio id="song">
<source src="codes/EC2026/sarki.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function playSong(){
document.getElementById("song").play();
}

</script>

</body>
</html>
