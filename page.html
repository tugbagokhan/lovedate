<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
margin-top:60px;
}

img{
width:90%;
max-width:400px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,0,100,0.4);
}

button{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
background:#ffc0cb;
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Bizim Şarkımız ❤️</h1>

<div class="container">

<img src="wedding.jpg">

<br>

<button onclick="playSong()">Şarkıyı Başlat 🎵</button>

<audio id="song" src="song.mp3"></audio>

</div>

<script>

function playSong(){
document.getElementById("song").play();
}

</script>

</body>
</html>
