<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim Şarkımız ❤️</title><style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
margin-top:60px;
padding:20px;
background:black;
border-radius:30px;
box-shadow:0 0 40px rgba(255,0,80,0.6);
width:90%;
max-width:420px;
margin-left:auto;
margin-right:auto;
}

img{
width:100%;
border-radius:20px;
box-shadow:0 0 25px rgba(255,0,80,0.5);
display:none;
}

button{
margin-top:20px;
padding:15px 40px;
border:none;
border-radius:40px;
background:#f3b6c1;
font-size:20px;
cursor:pointer;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
margin-top:15px;
text-align:center;
}

.error{
margin-top:20px;
color:red;
font-size:20px;
}
</style></head><body><h1>Bizim Şarkımız ❤️</h1><div class="container"><input id="codeInput" placeholder="Kodu gir">
<br><button onclick="loadContent()">Aç</button>

<br><br>

<img id="photo"><br><button onclick="playSong()">Şarkıyı Başlat 🎵</button>

<audio id="song"></audio>

<div id="error" class="error"></div></div><script>

function loadContent(){

const code=document.getElementById("codeInput").value;

const photoUrl="https://res.cloudinary.com/dbtlit7hz/image/upload/clients/"+code+".jpg";
const songUrl="codes/"+code+"/sarki.mp3";

const img=document.getElementById("photo");
const song=document.getElementById("song");
const error=document.getElementById("error");

error.innerText="";

img.src=photoUrl;
song.src=songUrl;

img.onload=function(){
img.style.display="block";
}

img.onerror=function(){
img.style.display="none";
error.innerText="Yanlış Kod";
}

}

function playSong(){
document.getElementById("song").play();
}

</script></body>
</html>
