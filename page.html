<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bizim Şarkımız</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
}

/* kalpler */

.heart{
position:fixed;
color:red;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:400px;
padding:30px;
border-radius:25px;
background:black;
box-shadow:0 0 40px red;
}

input{
width:90%;
padding:15px;
font-size:18px;
border-radius:15px;
border:none;
margin-top:10px;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
cursor:pointer;
}

#songBtn{
width:100%;
margin-top:25px;
}

#error{
color:red;
margin-top:15px;
font-size:18px;
display:none;
}

#foto{
display:none;
width:90%;
margin-top:20px;
border-radius:20px;
}

</style>
</head>

<body>

<h1>Bizim Şarkımız ❤️</h1>

<div class="container">

<input id="code" placeholder="Kodu gir">

<br>

<button onclick="kontrol()">Aç</button>

<br>

<img id="foto" src="foto.jpg">

<button id="songBtn" onclick="cal()">Şarkıyı Başlat 🎵</button>

<div id="error">Yanlış Kod</div>

<audio id="music" src="sarki.mp3"></audio>

</div>

<script>

function kontrol(){

let girilen = document.getElementById("code").value.trim()

if(girilen === "EC2026"){

document.getElementById("foto").style.display="block"
document.getElementById("error").style.display="none"

}else{

document.getElementById("error").style.display="block"

}

}

function cal(){

document.getElementById("music").play()

}

/* kalp oluştur */

for(let i=0;i<25;i++){

let kalp=document.createElement("div")
kalp.className="heart"
kalp.innerHTML="❤"

kalp.style.left=Math.random()*100+"%"
kalp.style.animationDuration=(3+Math.random()*5)+"s"

document.body.appendChild(kalp)

}

</script>

</body>
</html>
